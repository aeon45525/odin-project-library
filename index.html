<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project: Library</title>
  </head>
  <body>
    <div class="container">
      <div class="title">
        <span class="spanTitle">Project: Library</span>
        <button class="NewBook">New Book</button>
      </div>
      <div class="bookContainer"></div>

      <!-- New Book Form -->
      <dialog id="nbDialog">
        <form method="dialog">
          <span class="nbSpan">Enter New Book:</span>
          <div class="InputContainer">
            <div class="inputFields">
              <label for="title">Title:</label>
              <input type="text" id="title" placeholder="The Hobbit" />
            </div>
            <div class="inputFields">
              <label for="author">Author:</label>
              <input type="text" id="author" placeholder="J.R.R. Tolkien" />
            </div>
            <div class="inputFields">
              <label for="pages">Pages: </label>
              <input type="text" id="pages" placeholder="310 pages" />
            </div>
          </div>
          <div class="nbButtons">
            <button type="button">Cancel</button>
            <button type="reset">Clear</button>
            <button type="submit">Add</button>
          </div>
        </form>
      </dialog>
    </div>
  </body>
</html>
